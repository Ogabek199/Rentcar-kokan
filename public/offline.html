<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000d6b" />
    <title>Offline | Ziyo Rent Car</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #eef2ff;
      }
      .card {
        width: min(560px, calc(100% - 32px));
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
        color: rgba(238, 242, 255, 0.85);
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      a, button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      button {
        background: #4f46e5;
        color: #fff;
      }
      a {
        background: rgba(255, 255, 255, 0.10);
        color: #eef2ff;
      }
      .hint {
        font-size: 12px;
        opacity: 0.8;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Internet yo‘q (Offline)</h1>
      <p>
        Hozir tarmoqqa ulanmagan ko‘rinasiz. Internet qaytgach, sahifani yangilab ko‘ring.
      </p>
      <div class="actions">
        <button onclick="location.reload()">Qayta urinish</button>
        <a href="/home">Bosh sahifa</a>
        <a href="tel:+998912008550">Qo‘ng‘iroq qilish</a>
      </div>
      <div class="hint">Agar ilova o‘rnatilgan bo‘lsa, ba’zi sahifalar offline ham ishlashi mumkin.</div>
    </div>
  </body>
</html>
